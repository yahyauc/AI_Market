<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart — Smart Supermarket</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav id="navbar"></nav>

<div style="max-width:960px;margin:0 auto;padding:32px 24px">

    <div class="page-header">
        <h1><i class="fa-solid fa-cart-shopping" style="margin-right:8px"></i> Your Cart</h1>
        <p>Review your items before placing the order</p>
    </div>

    <div id="cart-content"></div>
</div>

<div class="toast-container" id="toast-container"></div>

<script type="module">
    import { createOrder, getUser } from '../js/api.js';
    import {
        getCart, removeFromCart, updateQty, clearCart,
        getCartTotal, buildNavbar, toast, formatPrice, categoryEmoji
    } from '../js/app.js';

    buildNavbar('cart');

    function render() {
        const cart      = getCart();
        const container = document.getElementById("cart-content");

        if (!cart.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon"><i class="fa-solid fa-cart-shopping" style="font-size:48px;color:var(--muted)"></i></div>
                    <h3>Your cart is empty</h3>
                    <p>Add some products to get started</p>
                    <a href="./products.html" class="btn btn-primary mt-16">Browse Products</a>
                </div>`;
            return;
        }

        container.innerHTML = `
            <div style="display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start">

                <!-- Items -->
                <div class="card" style="padding:0;overflow:hidden">
                    <div style="padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
                        <h3>Items (${cart.reduce((s,i) => s + i.quantity, 0)})</h3>
                        <button class="btn btn-outline btn-sm" onclick="handleClear()"><i class="fa-solid fa-trash"></i> Clear all</button>
                    </div>
                    <div id="items-list"></div>
                </div>

                <!-- Summary -->
                <div>
                    <div class="card" style="margin-bottom:16px">
                        <h3 style="margin-bottom:16px">Order Summary</h3>
                        <div id="summary-rows"></div>
                        <div style="border-top:2px solid var(--border);margin:14px 0;padding-top:14px;display:flex;justify-content:space-between;align-items:center">
                            <span style="font-size:15px;font-weight:700">Total</span>
                            <span style="font-size:20px;font-weight:800;color:var(--primary)" id="total-display"></span>
                        </div>
                        <div class="form-group" style="margin-bottom:12px">
                            <label class="form-label">Note (optional)</label>
                            <textarea id="order-note" class="form-control" rows="2" placeholder="Special instructions..."></textarea>
                        </div>
                        <button class="btn btn-primary w-full btn-lg" id="place-btn" onclick="handlePlaceOrder()">
                            Place Order →
                        </button>
                    </div>
                    <a href="./products.html" class="btn btn-outline w-full" style="justify-content:center">
                        ← Continue Shopping
                    </a>
                </div>
            </div>`;

        renderItems();
        renderSummary();
    }

    function renderItems() {
        const cart = getCart();
        const list = document.getElementById("items-list");
        if (!list) return;

        list.innerHTML = cart.map(item => `
            <div style="display:flex;align-items:center;gap:16px;padding:16px 22px;border-bottom:1px solid var(--border)">
                <div style="width:48px;height:48px;background:var(--bg);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">
                    <i class="fa-solid fa-box" style="font-size:20px;color:var(--muted)"></i>
                </div>
                <div style="flex:1;min-width:0">
                    <div style="font-weight:600;font-size:14px;color:var(--text)">${item.product_name}</div>
                    <div style="font-size:13px;color:var(--muted)">${formatPrice(item.price)} each</div>
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                    <button class="btn btn-outline btn-sm" style="padding:5px 10px"
                        onclick="changeQty(${item.product_id}, ${item.quantity - 1})">−</button>
                    <span style="font-weight:700;min-width:24px;text-align:center">${item.quantity}</span>
                    <button class="btn btn-outline btn-sm" style="padding:5px 10px"
                        onclick="changeQty(${item.product_id}, ${item.quantity + 1})">+</button>
                </div>
                <div style="font-weight:700;color:var(--primary);min-width:80px;text-align:right">
                    ${formatPrice(item.price * item.quantity)}
                </div>
                <button class="btn btn-ghost btn-sm" style="color:var(--red)"
                    onclick="handleRemove(${item.product_id})">✕</button>
            </div>
        `).join("");
    }

    function renderSummary() {
        const cart  = getCart();
        const rows  = document.getElementById("summary-rows");
        const total = document.getElementById("total-display");
        if (!rows) return;

        rows.innerHTML = cart.map(i => `
            <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-2);margin-bottom:8px">
                <span>${i.product_name} × ${i.quantity}</span>
                <span>${formatPrice(i.price * i.quantity)}</span>
            </div>
        `).join("");

        if (total) total.textContent = formatPrice(getCartTotal());
    }

    window.changeQty = function(productId, qty) {
        if (qty < 1) { handleRemove(productId); return; }
        updateQty(productId, qty);
        render();
    };

    window.handleRemove = function(productId) {
        removeFromCart(productId);
        toast("Item removed", "warning");
        render();
    };

    window.handleClear = function() {
        if (!confirm("Clear all items from cart?")) return;
        clearCart();
        render();
    };

    window.handlePlaceOrder = async function() {
        const user = getUser();
        if (!user) {
            toast("Please login to place an order", "error");
            setTimeout(() => window.location.href = "./login.html", 1500);
            return;
        }

        const cart = getCart();
        if (!cart.length) return;

        const note = document.getElementById("order-note")?.value || "";
        const btn  = document.getElementById("place-btn");

        btn.disabled = true;
        btn.innerHTML = `<span class="spinner"></span> Placing order...`;

        const items = cart.map(i => ({ product_id: i.product_id, quantity: i.quantity }));
        const res   = await createOrder(user.id, items, note);

        if (res.error) {
            toast(res.error, "error");
            btn.disabled = false;
            btn.textContent = "Place Order →";
            return;
        }

        clearCart();
        toast("Order placed successfully!", "success");
        setTimeout(() => window.location.href = "./orders.html", 1500);
    };

    render();
</script>

<!-- ── AI Chat Widget ── -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<div id="chat-widget-fab" onclick="toggleChatWidget()" title="Chat with AI Assistant"><i class="fa-solid fa-comments"></i></div>
<div id="chat-widget-panel">
    <div id="chat-widget-header"><div style="display:flex;align-items:center;gap:10px"><div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#16a34a,#059669);display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:700">AI</div><div><div style="font-size:14px;font-weight:700;color:#1a1f36">Smart Assistant</div><div style="font-size:11px;color:#16a34a;font-weight:600"><i class="fa-solid fa-circle" style="font-size:6px;margin-right:4px"></i>Online</div></div></div><button onclick="toggleChatWidget()" style="background:none;border:none;font-size:18px;color:#8891b8;cursor:pointer;padding:4px"><i class="fa-solid fa-xmark"></i></button></div>
    <div id="chat-widget-messages"><div class="cw-msg bot"><div class="cw-avatar">AI</div><div class="cw-bubble">Hi! Need help with your cart or have questions about products?</div></div></div>
    <div id="chat-widget-input-area"><input type="text" id="chat-widget-input" placeholder="Ask about products..." onkeydown="if(event.key==='Enter')sendChatWidget()"><button onclick="sendChatWidget()" id="chat-widget-send"><i class="fa-solid fa-paper-plane"></i></button></div>
</div>
<style>
    #chat-widget-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#16a34a,#059669);color:white;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:900;box-shadow:0 6px 20px rgba(22,163,74,0.4);transition:all 0.25s;animation:fabPulse 3s infinite}#chat-widget-fab:hover{transform:scale(1.1)}@keyframes fabPulse{0%,100%{box-shadow:0 6px 20px rgba(22,163,74,0.4)}50%{box-shadow:0 6px 28px rgba(22,163,74,0.6)}}#chat-widget-panel{position:fixed;bottom:92px;right:24px;width:380px;max-height:520px;background:#fff;border-radius:20px;box-shadow:0 16px 48px rgba(0,0,0,0.15);z-index:901;display:none;flex-direction:column;overflow:hidden;border:1px solid #e4e7f0}#chat-widget-panel.open{display:flex}#chat-widget-header{padding:14px 18px;border-bottom:1px solid #e4e7f0;display:flex;align-items:center;justify-content:space-between;background:#f5f6fa}#chat-widget-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;max-height:360px;min-height:200px}.cw-msg{display:flex;gap:8px;align-items:flex-start}.cw-msg.user{flex-direction:row-reverse}.cw-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}.cw-msg.bot .cw-avatar{background:linear-gradient(135deg,#16a34a,#059669);color:white}.cw-msg.user .cw-avatar{background:#16a34a;color:white}.cw-bubble{max-width:80%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.55}.cw-msg.bot .cw-bubble{background:#f5f6fa;color:#1a1f36;border-bottom-left-radius:4px}.cw-msg.user .cw-bubble{background:#16a34a;color:white;border-bottom-right-radius:4px}.cw-typing{display:flex;gap:4px;align-items:center;padding:10px 14px}.cw-typing-dot{width:6px;height:6px;background:#8891b8;border-radius:50%;animation:cwBounce 1.2s infinite}.cw-typing-dot:nth-child(2){animation-delay:0.2s}.cw-typing-dot:nth-child(3){animation-delay:0.4s}@keyframes cwBounce{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-5px);opacity:1}}#chat-widget-input-area{padding:12px 14px;border-top:1px solid #e4e7f0;display:flex;gap:8px;align-items:center;background:#fff}#chat-widget-input{flex:1;border:1px solid #d0d5e8;border-radius:10px;padding:9px 14px;font-size:13px;outline:none;font-family:inherit}#chat-widget-input:focus{border-color:#16a34a}#chat-widget-send{width:36px;height:36px;border-radius:10px;background:#16a34a;color:white;border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}#chat-widget-send:hover{background:#15803d}
</style>
<script>
    let _cwOpen=false,_cwHistory=[];const _cwAPI="http://127.0.0.1:5000/api/chatbot/customer";
    function toggleChatWidget(){_cwOpen=!_cwOpen;document.getElementById("chat-widget-panel").classList.toggle("open",_cwOpen);if(_cwOpen)document.getElementById("chat-widget-input").focus()}
    function sendChatWidget(){const input=document.getElementById("chat-widget-input");const text=input.value.trim();if(!text)return;const area=document.getElementById("chat-widget-messages");const user=JSON.parse(localStorage.getItem("user")||"null");const initial=user?user.username[0].toUpperCase():"U";area.innerHTML+=`<div class="cw-msg user"><div class="cw-avatar">${initial}</div><div class="cw-bubble">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>`;_cwHistory.push({role:"user",content:text});input.value="";area.scrollTop=area.scrollHeight;const typingId="cw-typing-"+Date.now();area.innerHTML+=`<div class="cw-msg bot" id="${typingId}"><div class="cw-avatar">AI</div><div class="cw-bubble"><div class="cw-typing"><div class="cw-typing-dot"></div><div class="cw-typing-dot"></div><div class="cw-typing-dot"></div></div></div></div>`;area.scrollTop=area.scrollHeight;fetch(_cwAPI,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:_cwHistory})}).then(r=>r.json()).then(data=>{const el=document.getElementById(typingId);if(el)el.remove();const reply=data.reply||data.error||"Sorry, something went wrong.";_cwHistory.push({role:"assistant",content:reply});area.innerHTML+=`<div class="cw-msg bot"><div class="cw-avatar">AI</div><div class="cw-bubble">${reply.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div></div>`;area.scrollTop=area.scrollHeight}).catch(()=>{const el=document.getElementById(typingId);if(el)el.remove();area.innerHTML+=`<div class="cw-msg bot"><div class="cw-avatar">AI</div><div class="cw-bubble">Sorry, I couldn't connect. Please try again.</div></div>`;area.scrollTop=area.scrollHeight})}
</script>
</body>
</html>
